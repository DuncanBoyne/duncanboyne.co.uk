<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Duncan Boyne — Power BI consultant in Norfolk, serving Norwich and Great Yarmouth. Dashboards, automation, and data & AI readiness." />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700;900&display=swap" rel="stylesheet">
		<script>
			(function () {
				try {
					// Dark is the site default; light only if explicitly chosen via the toggle.
					if (localStorage.getItem('theme') !== 'light') {
						document.documentElement.classList.add('dark');
					}
				} catch (e) {
					document.documentElement.classList.add('dark');
				}
				try {
					var p = new URLSearchParams(location.search);
					if (p.has('skip')) return;
					if (!p.has('intro')) {
						if (localStorage.getItem('intro:seen') === '1') return;
						if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
					}
					document.documentElement.classList.add('intro-pending');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="transition-colors">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
